<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simulador MRU</title>

<link rel="stylesheet" href="../style.css">

<style>

.simulador{
max-width:900px;
margin:auto;
padding:20px;
}

canvas{
background:white;
border:2px solid #333;
margin-top:20px;
}

.controles{
margin-top:20px;
}

label{
display:block;
margin-top:10px;
}

input{
width:200px;
}

</style>

</head>

<body>

<header>
<h1>Simulador MRU</h1>
<p>Movimiento Rectilíneo Uniforme</p>
</header>

<div class="simulador">

<canvas id="canvas" width="800" height="200"></canvas>

<div class="controles">

<label>
Velocidad (px/s)
<br>
<input type="range" id="velocidad" min="10" max="200" value="60">
</label>

<label>
Posición inicial
<br>
<input type="range" id="posicion" min="0" max="400" value="20">
</label>

<br>

<button onclick="iniciar()">Iniciar</button>
<button onclick="pausar()">Pausar</button>
<button onclick="reiniciar()">Reiniciar</button>

</div>

</div>

<script src="../js/mru.js"></script>

</body>
</html>
